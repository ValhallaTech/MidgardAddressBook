name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node (for Bootstrap assets)
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - name: Enable Corepack (Yarn 4.14.1)
        run: |
          corepack enable
          corepack prepare yarn@4.14.1 --activate

      - name: Restore
        run: dotnet restore MidgardAddressBook.slnx

      - name: Build
        run: dotnet build MidgardAddressBook.slnx -c Release --no-restore
