name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node (for Bootstrap assets)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore
        run: dotnet restore MidgardAddressBook.slnx

      - name: Build
        run: dotnet build MidgardAddressBook.slnx -c Release --no-restore
